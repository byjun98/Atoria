[versions]
agp = "9.1.1"
composeCompiler = "2.2.10"
ksp = "2.3.2"
composeBom = "2026.03.00"
activityCompose = "1.13.0"
androidxCore = "1.18.0"
lifecycle = "2.10.0"
navigation = "2.9.7"
