room = "2.8.4"
retrofitBom = "3.0.0"
okhttp = "5.1.0"
coil = "3.4.0"
kakaoMap = "2.13.1"
camerax = "1.6.0"
datastore = "1.2.1"
onnxruntime = "1.25.1"
mlkitFaceDetection = "16.1.7"
mlkitSelfieSegmentation = "16.0.0-beta6"

[libraries]
androidx-core-ktx = { module = "androidx.core:core-ktx", version.ref = "androidxCore" }
