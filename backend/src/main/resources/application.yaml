spring:
  application:
    name: backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/atoria}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis}

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

app:
  email:
    sender: ${APP_EMAIL_SENDER:log}
    from: ${APP_EMAIL_FROM:no-reply@atoria.com}
    verification-code-validity-seconds: ${EMAIL_VERIFICATION_CODE_VALIDITY_SECONDS:300}
    verification-code-store:
      type: ${EMAIL_VERIFICATION_CODE_STORE_TYPE:redis}

  password-reset:
    confirm-url: ${PASSWORD_RESET_CONFIRM_URL:}

  ai:
    base-url: ${AI_BASE_URL:http://localhost:8000}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:60}

  jwt:
    secret: ${JWT_SECRET:atoria-default-jwt-secret-key-for-local-development-32bytes}
    access-token-validity-seconds: ${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:3600}
    refresh-token-validity-seconds: ${JWT_REFRESH_TOKEN_VALIDITY_SECONDS:1209600}

  oauth:
    google:
      client-id: ${OAUTH_GOOGLE_CLIENT_ID:}
      client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${OAUTH_GOOGLE_REDIRECT_URI:http://localhost:8080/oauth2/callback/google}
    kakao:
      client-id: ${OAUTH_KAKAO_CLIENT_ID:}
      client-secret: ${OAUTH_KAKAO_CLIENT_SECRET:}
      redirect-uri: ${OAUTH_KAKAO_REDIRECT_URI:http://localhost:8080/oauth2/callback/kakao}

  s3:
    bucket: ${AWS_S3_BUCKET:atoria-local-bucket}
    region: ${AWS_REGION:ap-northeast-2}
    upload-prefix: ${AWS_S3_UPLOAD_PREFIX:uploads}
    presigned-url-expiration-minutes: ${AWS_S3_PRESIGNED_URL_EXPIRATION_MINUTES:10}
