version: "3.8"

services:
  nginx:
    build: ./nginx
    depends_on:
      - backend
      - ai
    networks:
      - app-network

  backend:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - ai
    networks:
      - app-network
    expose:
      - "8080"

  ai:
    build: ./ai
    env_file:
      - .env
    networks:
      - app-network
    expose:
      - "8000"

  db:
    image: pgvector/pgvector:pg16
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    expose:
      - "5432" 

  redis:
    image: redis:7
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - app-network
    expose:
      - "6379"  
networks:
  app-network:

volumes:
  db-data: